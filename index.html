<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema de Equipamentos TI</title>
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/login.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="./img/central_24_horas_logo.jpg" />
  </head>
  <body>
    <div id="loginPage" class="login-page active">
      <div class="login-box">
        <img
          src="./img/central_24_horas_logo.jpg"
          alt="Logo da central 24 horas"
          class="login-logo"
        />

        <h2>Login</h2>

        <form id="loginForm">
          <input type="text" id="loginUser" placeholder="Usuário" required />
          <input type="password" id="loginPass" placeholder="Senha" required />
          <button type="submit">Entrar</button>
        </form>

        <p id="loginError" class="error-message-login"></p>
      </div>
    </div>
    <script src="./js/login.js"></script>
  </body>
</html>
